{% load static %}
<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}One BNBU-ACM{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'core/images/acm-star-badge.png' %}">
    <link rel="shortcut icon" type="image/png" href="{% static 'core/images/acm-star-badge.png' %}">
    <link rel="apple-touch-icon" href="{% static 'core/images/acm-star-badge.png' %}">
    <style>
        :root {
            --background: #f6f7f9;
            --foreground: #09090b;
            --card: #ffffff;
            --muted-foreground: #71717a;
            --border: #e4e4e7;
            --input: #e4e4e7;
            --primary: #18181b;
            --primary-foreground: #fafafa;
            --secondary: #f4f4f5;
            --ring: rgba(24, 24, 27, 0.14);
            --shadow: 0 1px 2px rgba(15, 23, 42, 0.03), 0 10px 32px rgba(15, 23, 42, 0.05);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "SF Pro Display", "SF Pro Text", "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
            color: var(--foreground);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 24%),
                linear-gradient(180deg, #fafafa 0%, var(--background) 100%);
        }

        .auth-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .auth-card {
            width: min(960px, 100%);
            display: grid;
            grid-template-columns: 1.2fr 0.92fr;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(228, 228, 231, 0.95);
            box-shadow: var(--shadow);
        }

        .auth-side {
            padding: 42px;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.14), transparent 32%),
                linear-gradient(180deg, #111113, #27272a);
            color: #ffffff;
            position: relative;
            display: grid;
            place-items: center;
        }

        .auth-side::before {
            content: "";
            position: absolute;
            inset: 22px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }

        .brand-mark {
            width: min(280px, 72%);
            height: auto;
            filter: drop-shadow(0 22px 42px rgba(0, 0, 0, 0.34));
        }

        .brand-lockup {
            position: relative;
            z-index: 1;
            display: grid;
            justify-items: center;
            gap: 22px;
            text-align: center;
        }

        .brand-lockup h1 {
            margin: 0;
            font-size: clamp(1.8rem, 3.2vw, 2.6rem);
            line-height: 1.05;
            letter-spacing: -0.04em;
            font-weight: 700;
        }

        .auth-form {
            padding: 42px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
        }

        .auth-form h2 {
            margin: 0;
            font-size: 1.55rem;
        }

        .auth-form p {
            margin: 0;
            color: var(--muted-foreground);
        }

        form p {
            display: grid;
            gap: 8px;
            margin: 0 0 18px;
        }

        input,
        textarea,
        select,
        button {
            font: inherit;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            min-height: 40px;
            border: 1px solid var(--input);
            background: var(--card);
            color: var(--foreground);
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03) inset;
        }

        button {
            min-height: 40px;
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 10px 14px;
            background: var(--primary);
            color: var(--primary-foreground);
            cursor: pointer;
            font-weight: 600;
            transition: background 0.16s ease, box-shadow 0.16s ease;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        button:hover {
            background: #27272a;
        }

        .auth-form form button {
            margin-top: 6px;
        }

        .auth-actions {
            display: grid;
            gap: 12px;
            margin-top: 18px;
        }

        .auth-footnote {
            margin: 0;
            color: var(--muted-foreground);
            font-size: 0.92rem;
        }

        .inline-link {
            color: var(--foreground);
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid rgba(9, 9, 11, 0.18);
        }

        .inline-link:hover {
            border-bottom-color: rgba(9, 9, 11, 0.42);
        }

        input:focus-visible,
        textarea:focus-visible,
        select:focus-visible,
        button:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px var(--ring);
        }

        .helptext {
            color: #a1a1aa;
            font-size: 0.84rem;
            line-height: 1.5;
        }

        .errorlist {
            list-style: none;
            margin: 0;
            padding: 0;
            color: #b91c1c;
            font-size: 0.88rem;
        }

        .errorlist li {
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid #fecaca;
            background: #fef2f2;
        }

        .messages {
            display: grid;
            gap: 10px;
            margin-bottom: 18px;
        }

        .message {
            padding: 13px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
        }

        @media (max-width: 980px) {
            .auth-card {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            .auth-form,
            .auth-side {
                padding: 22px;
            }

            .brand-mark {
                width: min(220px, 64vw);
            }
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-side">
                <div class="brand-lockup">
                    <img class="brand-mark" src="{% static 'core/images/acm-star-badge.png' %}" alt="BNBU-ACM Logo">
                    <h1>One BNBU-ACM</h1>
                </div>
            </div>
            <div class="auth-form">
                {% if messages %}
                    <div class="messages">
                        {% for message in messages %}
                            <div class="message {{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
