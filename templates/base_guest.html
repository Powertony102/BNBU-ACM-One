<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}One BNBU-ACM{% endblock %}</title>
    <style>
        :root {
            --background: #f6f7f9;
            --foreground: #09090b;
            --card: #ffffff;
            --muted-foreground: #71717a;
            --border: #e4e4e7;
            --input: #e4e4e7;
            --primary: #18181b;
            --primary-foreground: #fafafa;
            --secondary: #f4f4f5;
            --ring: rgba(24, 24, 27, 0.14);
            --shadow: 0 1px 2px rgba(15, 23, 42, 0.03), 0 10px 32px rgba(15, 23, 42, 0.05);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "SF Pro Display", "SF Pro Text", "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
            color: var(--foreground);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 24%),
                linear-gradient(180deg, #fafafa 0%, var(--background) 100%);
        }

        .version-pill {
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.82);
            font-size: 0.78rem;
            font-weight: 600;
        }

        .auth-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .auth-card {
            width: min(960px, 100%);
            display: grid;
            grid-template-columns: 1.2fr 0.92fr;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(228, 228, 231, 0.95);
            box-shadow: var(--shadow);
        }

        .auth-side {
            padding: 42px;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.14), transparent 32%),
                linear-gradient(180deg, #111113, #27272a);
            color: #ffffff;
        }

        .auth-side h1 {
            margin: 22px 0 10px;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.04;
            letter-spacing: -0.04em;
        }

        .auth-side p {
            margin: 0;
            max-width: 420px;
            color: rgba(255, 255, 255, 0.74);
            line-height: 1.7;
        }

        .auth-highlights {
            margin-top: 28px;
            display: grid;
            gap: 10px;
        }

        .auth-highlight {
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .auth-form {
            padding: 42px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
        }

        .auth-form h2 {
            margin: 0;
            font-size: 1.55rem;
        }

        .auth-form p {
            margin: 0;
            color: var(--muted-foreground);
        }

        form p {
            display: grid;
            gap: 8px;
            margin: 0 0 16px;
        }

        input,
        textarea,
        select,
        button {
            font: inherit;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            min-height: 40px;
            border: 1px solid var(--input);
            background: var(--card);
            color: var(--foreground);
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03) inset;
        }

        button {
            min-height: 40px;
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 10px 14px;
            background: var(--primary);
            color: var(--primary-foreground);
            cursor: pointer;
            font-weight: 600;
            transition: background 0.16s ease, box-shadow 0.16s ease;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        button:hover {
            background: #27272a;
        }

        input:focus-visible,
        textarea:focus-visible,
        select:focus-visible,
        button:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px var(--ring);
        }

        .helptext {
            color: #a1a1aa;
            font-size: 0.84rem;
            line-height: 1.5;
        }

        .errorlist {
            list-style: none;
            margin: 0;
            padding: 0;
            color: #b91c1c;
            font-size: 0.88rem;
        }

        .errorlist li {
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid #fecaca;
            background: #fef2f2;
        }

        .messages {
            display: grid;
            gap: 10px;
            margin-bottom: 18px;
        }

        .message {
            padding: 13px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
        }

        @media (max-width: 980px) {
            .auth-card {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            .auth-form,
            .auth-side {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-side">
                <span class="version-pill">One BNBU-ACM</span>
                <h1>BNBU ACM 活动签到系统</h1>
                <p>参考你喜欢的校内工具风格，我们把原型收敛成了更安静、更规整的应用界面，适合活动、签到和团队运营场景。</p>
                <div class="auth-highlights">
                    <div class="auth-highlight">队员端：看 Star、看活动、改资料、完成签到</div>
                    <div class="auth-highlight">管理端：建活动、发签到入口、看统计、控流程</div>
                    <div class="auth-highlight">二维码链路：扫码后登录，再回到签到页完成签到</div>
                </div>
            </div>
            <div class="auth-form">
                {% if messages %}
                    <div class="messages">
                        {% for message in messages %}
                            <div class="message {{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
