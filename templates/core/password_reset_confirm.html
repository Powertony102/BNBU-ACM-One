{% extends "base_guest.html" %}

{% block title %}重置密码 | One BNBU-ACM{% endblock %}

{% block content %}
<h2>重置密码</h2>
<p>请输入邮箱收到的验证码，并设置一个新的登录密码。</p>
<form method="post" style="margin-top: 8px;">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="auth-actions">
        <button type="submit">确认重置密码</button>
        <p class="auth-footnote"><a class="inline-link" href="{% url 'password-reset-request' %}">重新发送验证码</a></p>
        <p class="auth-footnote"><a class="inline-link" href="{% url 'login' %}">返回登录</a></p>
    </div>
</form>
{% endblock %}
