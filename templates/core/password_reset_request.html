{% extends "base_guest.html" %}

{% block title %}找回密码 | One BNBU-ACM{% endblock %}

{% block content %}
<h2>找回密码</h2>
<p>输入你的用户名和学校邮箱，我们会向绑定邮箱发送 6 位验证码。</p>
<form method="post" style="margin-top: 8px;">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="auth-actions">
        <button type="submit">发送验证码</button>
        <p class="auth-footnote">想起密码了？<a class="inline-link" href="{% url 'login' %}">返回登录</a></p>
    </div>
</form>
{% endblock %}
