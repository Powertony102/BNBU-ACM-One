{% extends "base_guest.html" %}

{% block title %}登录 | One BNBU-ACM{% endblock %}

{% block content %}
<h2>登录系统</h2>
<p>使用你的 ACM 团队账号进入 One BNBU-ACM 原型。</p>
<form method="post" style="margin-top: 8px;">
    {% csrf_token %}
    {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    {{ form.as_p }}
    <div class="auth-actions">
        <button type="submit">进入系统</button>
        <p class="auth-footnote"><a class="inline-link" href="{% url 'password-reset-request' %}">忘记密码？通过邮箱验证码找回</a></p>
        <p class="auth-footnote">还没有账号？<a class="inline-link" href="{% url 'register' %}{% if next %}?next={{ next|urlencode }}{% endif %}">立即注册</a></p>
    </div>
</form>
{% endblock %}
