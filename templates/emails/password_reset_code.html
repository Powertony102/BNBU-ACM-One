<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="utf-8">
    <title>One BNBU-ACM 密码重置验证码</title>
</head>
<body style="margin: 0; padding: 24px; background: #f6f7f9; font-family: 'Segoe UI', 'PingFang SC', sans-serif; color: #111827;">
    <div style="max-width: 560px; margin: 0 auto; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 18px; padding: 28px;">
        <h1 style="margin: 0 0 16px; font-size: 24px;">One BNBU-ACM 密码重置验证码</h1>
        <p style="margin: 0 0 12px; line-height: 1.7;">你好，账号 <strong>{{ username }}</strong> 正在申请重置密码。</p>
        <p style="margin: 0 0 20px; line-height: 1.7;">请输入下面的 6 位验证码完成校验：</p>
        <div style="margin: 0 0 20px; padding: 18px; border-radius: 14px; background: #111827; color: #ffffff; font-size: 30px; font-weight: 700; letter-spacing: 0.32em; text-align: center;">
            {{ code }}
        </div>
        <p style="margin: 0 0 12px; line-height: 1.7;">验证码将在 <strong>{{ expires_in_minutes }} 分钟</strong>后失效。</p>
        <p style="margin: 0; line-height: 1.7; color: #6b7280;">如果这不是你本人发起的操作，请忽略这封邮件。</p>
    </div>
</body>
</html>
